    <style>
        @import url(/css/global.css); @font-face{ font-family: 'Core Sans'; src: url(/src/CoreSans.otf); font-display: swap;} :root{ --mrc: #f44234; --mrc-light: #ff7063; --mrc-glow: rgba(244, 66, 52, .4); --bg-dark: #09090b; --bg-surface: #18181b; --bg-surface-elevated: #27272a; --text-main: #f8fafc; --text-muted: #a1a1aa; --glass-bg: rgba(24, 24, 27, .65); --glass-border: rgba(255, 255, 255, .4); --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, .3); --font-sans: 'Core Sans', system-ui, -apple-system, sans-serif; --font-mono: 'Space Mono', ui-monospace, monospace; --container-width: 1280px; --nav-height: 80px} *{ margin: 0; padding: 0; box-sizing: border-box} html{ scroll-behavior: smooth; font-size: 16px} body{ font-family: var(--font-sans); background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; -webkit-font-smoothing: antialiased; line-height: 1.5} a{ text-decoration: none; color: inherit; transition: all .3s ease} img, svg{ max-width: 100%; display: block} button{ cursor: pointer; border: none; background: none; font-family: inherit} .tech-grid{ position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(var(--glass-border) 1px, rgb(244 66 52 / 40%) 1px), linear-gradient(90deg, rgb(255 255 255 / 40%) 1px, rgb(0 0 0 / 20%) 1px); background-size: 40px 40px; mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%); -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%)} html, body{ -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none} [selectable], [selectable] *{ -webkit-user-select: text !important; -moz-user-select: text !important; -ms-user-select: text !important; user-select: text !important; cursor: text} img, svg{ -webkit-user-drag: none; pointer-events: none} .pointer-events-auto{ pointer-events: auto !important} .main{ display: flex; justify-content: center; align-items: center; padding: 4rem; margin-top: clamp(5rem, 16vw, 8rem); position: relative; height: 100%; width: 100%} .div{ content: ""} .div .error{ display: flex; justify-content: center; align-items: center; pointer-events: none} .div .error{ font-size: 10rem; font-weight: 900; color: var(--mrc); line-height: .7} .div .error .trytryagain{ filter: grayscale(1) contrast(1); will-change: filter, opacity} @keyframes bulbFail{ 0%{ opacity: .65; filter: grayscale(1)} 6%{ opacity: .9; filter: grayscale(.5) saturate(1.1)} 10%{ opacity: .55; filter: grayscale(1)} 18%{ opacity: 1; filter: grayscale(.82) saturate(1.2)} 24%{ opacity: .45; filter: grayscale(1)} 34%{ opacity: .95; filter: grayscale(.75) saturate(1.25)} 42%{ opacity: .4; filter: grayscale(1)} 56%{ opacity: 1; filter: grayscale(.65) saturate(1.35) contrast(1.05)} 66%{ opacity: .45; filter: grayscale(1)} 78%{ opacity: .75; filter: grayscale(.9)} 100%{ opacity: .65; filter: grayscale(1)}} .div h2{ color: var(--text-main); font-weight: 700; text-align: center; font-size: 2.5rem; margin: 1rem 0} .div p{ color: var(--text-muted); max-width: 500px; margin: 0 auto; font-size: 1.1rem; line-height: 1.6} .div p.alt{ color: var(--text-main);} .div .div2{ display: flex; flex-wrap: wrap; justify-content: center;} .div .div2 .btn-home-play{ display: inline-flex; justify-content: center; align-items: center; gap: .75rem; padding: 1rem; margin: 0 .5rem; border-radius: .7rem; background: var(--mrc); color: #fff; font-size: clamp(.75rem, 2vw, 1.1rem); font-weight: 700; text-transform: uppercase; letter-spacing: .1em; transition: all .3s ease; box-shadow: 0 5px 20px var(--mrc-glow); width: clamp(12rem, 30vw, 15rem); margin-top: 1rem} .div .div2 .btn-home-play:hover{ background: var(--mrc-light); transform: translateY(-2px); box-shadow: 0 8px 25px var(--mrc-glow)} .div .div2 .icon{ width: 1.25em; height: 1.25em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;}
    </style>

    <script>
        const trytryagain = document.querySelector('.trytryagain'); function tryGlow() { trytryagain.style.animation = 'none'; trytryagain.offsetHeight; trytryagain.style.animation = 'bulbFail 1.4s linear'; } setTimeout(tryGlow, 2000); setInterval(tryGlow, 7000);
