<body>

    <div id="loader" class="loader" style="pointer-events: none;">
        <img style="height: 120px; pointer-events: none;" src="/src/mrc-nuca-loading.svg" alt="mrc-nuca-loading">
        <div class="loader-text-wrapper">
            <span class="loader-text-letter">I</span>
            <span class="loader-text-letter">n</span>
            <span class="loader-text-letter">i</span>
            <span class="loader-text-letter">t</span>
            <span class="loader-text-letter">i</span>
            <span class="loader-text-letter">a</span>
            <span class="loader-text-letter">l</span>
            <span class="loader-text-letter">i</span>
            <span class="loader-text-letter">z</span>
            <span class="loader-text-letter">i</span>
            <span class="loader-text-letter">n</span>
            <span class="loader-text-letter">g</span>
            <hr>
            <span class="loader-text-letter">C</span>
            <span class="loader-text-letter">o</span>
            <span class="loader-text-letter">r</span>
            <span class="loader-text-letter">e</span>
            <div class="loader-colors"></div>
        </div>
    </div>

    <div class="tech-grid"></div>
    <div class="ambient-orb first-orb"></div>
    <div class="ambient-orb second-orb"></div>

    <main class="main-404 flex items-center justify-center pad-8">
        <div id="display-404" class="txt-center flex-col items-center">
            <div class="div-404">
                <div class="error font-black txt-mrc flex items-center justify-center">
                    <span>4</span>
                    <img src="/src/144.png" alt="Not Found">
                    <span>4</span>
                </div>
                <h2 class="font-bold text-main"> Route Lost. </h2>
                <p class="txt-muted">
                    The data packet you requested has drifted into the digital void. This route does not exist in the MainRoute Core.
                </p>
                <div>
                    <a href="/" class="btn-home-play">
                        Return to Core 
                        <svg class="icon">
                            <use href="/src/global.svg#icon-home"></use>
                        </svg>
                    </a>
                    <div href="/" class="btn-home-play">
                        Play Core Roll 
                        <svg class="icon">
                            <use href="/src/global.svg#icon-play"></use>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="div-404-game">

            </div>
        </div>
    </main>

    <footer class="txt-center txt-muted txt-sm pos-fix">
        <p>&copy; 2024-<span id="year">2026</span> MainRoute Core. M Ramzan Ch | Pro Bandey. All rights reserved.</p>
    </footer>

    <script>
        window.addEventListener('load', () => { const loader = document.getElementById('loader'); setTimeout(() => { loader.classList.add('hidden'); }, 2000); }); document.getElementById('year').textContent = new Date().getFullYear();
    </script>
